name: Build Mod - Infinite Dimensions

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache do Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Permissão ao gradlew
        run: chmod +x gradlew

      - name: Compilar mod
        run: ./gradlew build --no-daemon -x test
        env:
          GRADLE_OPTS: "-Xmx4G"

      - name: Upload do .jar compilado
        uses: actions/upload-artifact@v4
        with:
          name: infinite-dimensions-${{ github.sha }}
          path: build/libs/infinite-dimensions-*.jar
          if-no-files-found: error
          retention-days: 30
